{% extends 'movies/fragments/base.html' %}
{% block main-content %}
    <div class="row">
        <div class="col s6 offset-s3">
            <div class="card">
                <div class="card-content">
                    <span class="card-title red-text">Confirmar eliminacion</span>
                    <p>Esta seguro que desea eliminar {{ tipo }}: <b>{{ objeto }}</b>?</p>
                    <p class="grey-text">Esta accion no se puede deshacer.</p>
                </div>
                <div class="card-action">
                    <form method="post">
                        {% csrf_token %}
                        <button class="btn red darken-1 waves-effect waves-light" type="submit">
                            <i class="material-icons left">delete</i>Si, eliminar
                        </button>
                        <a class="btn grey waves-effect waves-light" href="javascript:history.back()">Cancelar</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
{% endblock %}
